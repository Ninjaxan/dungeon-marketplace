name: Compile & Deploy Contracts

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust and wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: Compile contracts and optimize for MVP wasm
        env:
          RUSTFLAGS: "-C link-arg=-s"
        run: |
          cd contracts
          # Use Rust nightly for target-feature flags
          rustup toolchain install nightly --target wasm32-unknown-unknown
          RUSTFLAGS="-C link-arg=-s -C target-feature=-reference-types,-multivalue,-sign-ext,-bulk-memory" \
            cargo +nightly build --release --target wasm32-unknown-unknown -Z build-std=std,panic_abort --target wasm32-unknown-unknown || \
          cargo build --release --target wasm32-unknown-unknown
          mkdir -p artifacts
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            name=$(basename "$wasm")
            # wasm-opt with MVP features only — strips post-MVP opcodes
            wasm-opt -Oz --mvp-features "$wasm" -o "artifacts/$name" 2>/dev/null || cp "$wasm" "artifacts/$name"
          done
          ls -lh artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install @cosmjs/cosmwasm-stargate @cosmjs/proto-signing @cosmjs/stargate

      - name: Copy artifacts
        run: |
          mkdir -p scripts/artifacts
          cp contracts/artifacts/*.wasm scripts/artifacts/

      - name: Deploy contracts
        env:
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          RPC_URL: http://67.218.8.89:26657
        run: node scripts/deploy-contracts.js

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: scripts/deployed-addresses.txt
