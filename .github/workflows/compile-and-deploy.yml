name: Compile & Deploy Contracts

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile contracts (workspace-optimizer)
        run: |
          # workspace-optimizer expects Cargo.toml at the mount root
          # Mount the contracts/ dir as /code so it finds the workspace
          docker run --rm \
            -v "$(pwd)/contracts":/code \
            --mount type=volume,source=contracts_cache,target=/target \
            --mount type=volume,source=registry_cache,target=/usr/local/cargo/registry \
            cosmwasm/workspace-optimizer:0.16.0

          echo "=== Artifacts ==="
          find contracts/ -name "*.wasm" -ls 2>/dev/null || true
          ls -lhR contracts/artifacts/ 2>/dev/null || echo "No contracts/artifacts dir"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install @cosmjs/cosmwasm-stargate @cosmjs/proto-signing @cosmjs/stargate

      - name: Copy artifacts
        run: |
          mkdir -p scripts/artifacts
          # workspace-optimizer outputs to /code/artifacts (= contracts/artifacts/)
          # File names use underscores: cw721_dungeon.wasm, dungeon_marketplace.wasm
          cp contracts/artifacts/*.wasm scripts/artifacts/ 2>/dev/null || \
          cp contracts/target/wasm32-unknown-unknown/release/*.wasm scripts/artifacts/ 2>/dev/null || \
          (echo "ERROR: No .wasm files found" && find . -name "*.wasm" -ls && exit 1)
          ls -lh scripts/artifacts/

      - name: Deploy contracts
        env:
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          RPC_URL: http://67.218.8.89:26657
        run: node scripts/deploy-contracts.js

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: scripts/deployed-addresses.txt
