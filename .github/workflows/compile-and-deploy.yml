name: Compile & Deploy Contracts

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75 and generate lock files
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.75.0'
          targets: wasm32-unknown-unknown

      - name: Prepare individual contract builds
        run: |
          cd contracts

          # Generate workspace Cargo.lock with Rust 1.75 compatible deps
          cargo generate-lockfile

          # Pin base64ct to <1.7 (1.8+ requires edition2024 which Rust 1.75 can't parse)
          cargo update -p base64ct --precise 1.6.0

          # Copy lock file into each contract for the optimizer
          cp Cargo.lock cw721-dungeon/Cargo.lock
          cp Cargo.lock marketplace/Cargo.lock

      - name: Compile CW721 contract
        run: |
          docker run --rm \
            -v "$(pwd)/contracts/cw721-dungeon":/code \
            --mount type=volume,source=cw721_cache,target=/target \
            --mount type=volume,source=registry_cache,target=/usr/local/cargo/registry \
            cosmwasm/rust-optimizer:0.15.1

          ls -lh contracts/cw721-dungeon/artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Compile Marketplace contract
        run: |
          docker run --rm \
            -v "$(pwd)/contracts/marketplace":/code \
            --mount type=volume,source=marketplace_cache,target=/target \
            --mount type=volume,source=registry_cache2,target=/usr/local/cargo/registry \
            cosmwasm/rust-optimizer:0.15.1

          ls -lh contracts/marketplace/artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install @cosmjs/cosmwasm-stargate @cosmjs/proto-signing @cosmjs/stargate

      - name: Copy artifacts
        run: |
          mkdir -p scripts/artifacts
          cp contracts/cw721-dungeon/artifacts/*.wasm scripts/artifacts/ 2>/dev/null || true
          cp contracts/marketplace/artifacts/*.wasm scripts/artifacts/ 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -lh scripts/artifacts/
          test -f scripts/artifacts/*.wasm || (echo "ERROR: No .wasm files" && exit 1)

      - name: Deploy contracts
        env:
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          RPC_URL: http://67.218.8.89:26657
        run: node scripts/deploy-contracts.js

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: scripts/deployed-addresses.txt
