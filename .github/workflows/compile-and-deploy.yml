name: Compile & Deploy Contracts

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust and wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Compile contracts (MVP wasm only)
        run: |
          cd contracts
          # Create .cargo/config.toml at workspace root for cargo to find
          mkdir -p .cargo
          cat > .cargo/config.toml << 'TOML'
          [target.wasm32-unknown-unknown]
          rustflags = ["-C", "link-arg=-s", "-C", "target-feature=-reference-types,-multivalue,-sign-ext,-bulk-memory"]
          TOML

          # Clean any cached builds
          cargo clean
          cargo build --release --target wasm32-unknown-unknown

          mkdir -p artifacts
          cp target/wasm32-unknown-unknown/release/cw721_dungeon.wasm artifacts/
          cp target/wasm32-unknown-unknown/release/dungeon_marketplace.wasm artifacts/
          ls -lh artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install @cosmjs/cosmwasm-stargate @cosmjs/proto-signing @cosmjs/stargate

      - name: Copy artifacts
        run: |
          mkdir -p scripts/artifacts
          cp contracts/artifacts/*.wasm scripts/artifacts/

      - name: Deploy contracts
        env:
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          RPC_URL: http://67.218.8.89:26657
        run: node scripts/deploy-contracts.js

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: scripts/deployed-addresses.txt
