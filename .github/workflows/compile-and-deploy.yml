name: Compile & Deploy Contracts

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile CW721 contract
        run: |
          docker run --rm \
            -v "$(pwd)/contracts/cw721-dungeon":/code \
            -v "$(pwd)/contracts":/contracts_workspace \
            --mount type=volume,source=cw721_cache,target=/target \
            --mount type=volume,source=registry_cache,target=/usr/local/cargo/registry \
            -e CARGO_MANIFEST_DIR=/code \
            cosmwasm/rust-optimizer:0.16.0

          ls -lh contracts/cw721-dungeon/artifacts/ 2>/dev/null || true

      - name: Compile Marketplace contract
        run: |
          docker run --rm \
            -v "$(pwd)/contracts/marketplace":/code \
            --mount type=volume,source=marketplace_cache,target=/target \
            --mount type=volume,source=registry_cache,target=/usr/local/cargo/registry \
            cosmwasm/rust-optimizer:0.16.0

          ls -lh contracts/marketplace/artifacts/ 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install @cosmjs/cosmwasm-stargate @cosmjs/proto-signing @cosmjs/stargate

      - name: Copy artifacts
        run: |
          mkdir -p scripts/artifacts
          echo "=== Finding all .wasm files ==="
          find . -name "*.wasm" -ls

          # rust-optimizer outputs to /code/artifacts/ inside each contract dir
          cp contracts/cw721-dungeon/artifacts/cw721_dungeon.wasm scripts/artifacts/ 2>/dev/null || \
          cp contracts/cw721-dungeon/artifacts/*.wasm scripts/artifacts/ 2>/dev/null || true

          cp contracts/marketplace/artifacts/dungeon_marketplace.wasm scripts/artifacts/ 2>/dev/null || \
          cp contracts/marketplace/artifacts/*.wasm scripts/artifacts/ 2>/dev/null || true

          echo "=== Final artifacts ==="
          ls -lh scripts/artifacts/
          test -f scripts/artifacts/*.wasm || (echo "ERROR: No .wasm artifacts" && exit 1)

      - name: Deploy contracts
        env:
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          RPC_URL: http://67.218.8.89:26657
        run: node scripts/deploy-contracts.js

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: scripts/deployed-addresses.txt
