name: Compile & Deploy Contracts

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.78 and wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.78.0'
          targets: wasm32-unknown-unknown

      - name: Install wasm-opt (binaryen)
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_118/binaryen-version_118-x86_64-linux.tar.gz | tar xz
          sudo cp binaryen-version_118/bin/wasm-opt /usr/local/bin/
          wasm-opt --version

      - name: Compile contracts
        run: |
          cd contracts
          RUSTFLAGS='-C link-arg=-s' cargo build --release --target wasm32-unknown-unknown --locked

          mkdir -p artifacts
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            name=$(basename "$wasm")
            echo "Optimizing $name ..."
            wasm-opt "$wasm" -Os --mvp -o "artifacts/$name"
          done

          ls -lh artifacts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install @cosmjs/cosmwasm-stargate @cosmjs/proto-signing @cosmjs/stargate

      - name: Copy artifacts
        run: |
          mkdir -p scripts/artifacts
          cp contracts/artifacts/*.wasm scripts/artifacts/
          ls -lh scripts/artifacts/

      - name: Deploy contracts
        env:
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          RPC_URL: http://67.218.8.89:26657
        run: node scripts/deploy-contracts.js

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: scripts/deployed-addresses.txt
