name: Compile Contracts

on:
  push:
    paths:
      - 'contracts/**'
  workflow_dispatch:  # manual trigger

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: contracts-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/**/Cargo.toml') }}

      - name: Build CW721 contract
        working-directory: contracts
        run: |
          cargo build --release --target wasm32-unknown-unknown -p cw721-dungeon
          cp target/wasm32-unknown-unknown/release/cw721_dungeon.wasm ../cw721_dungeon.wasm

      - name: Build Marketplace contract
        working-directory: contracts
        run: |
          cargo build --release --target wasm32-unknown-unknown -p dungeon-marketplace
          cp target/wasm32-unknown-unknown/release/dungeon_marketplace.wasm ../dungeon_marketplace.wasm

      - name: Optimize with wasm-opt (optional)
        run: |
          if command -v wasm-opt &> /dev/null; then
            wasm-opt -Oz cw721_dungeon.wasm -o cw721_dungeon.wasm
            wasm-opt -Oz dungeon_marketplace.wasm -o dungeon_marketplace.wasm
          fi

      - name: Show sizes
        run: ls -lh *.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: |
            cw721_dungeon.wasm
            dungeon_marketplace.wasm
          retention-days: 30
